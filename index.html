<!DOCTYPE html>
<html lang="cs">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ThreeJS Engine FPS</title>
    <style>
        html,
        body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #0b1020;
            font-family: Arial, sans-serif;
        }
    </style>
</head>

<body>
    <script type="module">
        import RAPIER from './libs/rapier.js';
        import * as THREE from './libs/three.module.js';
        import Stats from './libs/stats.module.js';
        import { GLTFLoader } from './libs/GLTFLoader.js';
        import { clone } from './libs/SkeletonUtils.js';
        import { RGBELoader } from './libs/RGBELoader.js';
        import GUI from './libs/lilgui.js';

        import { ShaderPass } from './libs/postprocessing/ShaderPass.js';
        import { EffectComposer } from './libs/postprocessing/EffectComposer.js';
        import { RenderPass } from './libs/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from './libs/postprocessing/UnrealBloomPass.js';
        import { OutputPass } from './libs/postprocessing/OutputPass.js';
        import { BokehPass } from './libs/postprocessing/BokehPass.js';
        import { GTAOPass } from './libs/postprocessing/GTAOPass.js';
        import { SMAAPass } from './libs/postprocessing/SMAAPass.js';
        import { OutlinePass } from './libs/postprocessing/OutlinePass.js';
        import { TAARenderPass } from './libs/postprocessing/TAARenderPass.js';

        import {
            RandomHexColor,
            Engine,
            GameScene,
            Player,
            BoxInstance,
            AnimatedCharacter,
            BasicModelInstance,
            PlaneInstance,
            FPSPlayer,
            Material,
            Indoraptor
        } from './engine.js';

        const engine = new Engine({
            rapier: RAPIER,
            THREE: THREE,
            Stats: Stats,
            GLTFLoader: GLTFLoader,
            RGBELoader: RGBELoader,
            clone: clone,
            gui: GUI,
            ShaderPass,
            EffectComposer: EffectComposer,
            RenderPass: RenderPass,
            UnrealBloomPass: UnrealBloomPass,
            OutputPass: OutputPass,
            BokehPass: BokehPass,
            GTAOPass: GTAOPass,
            SMAAPass: SMAAPass,
            OutlinePass: OutlinePass,
            TAARenderPass: TAARenderPass
        });

        engine.add_texture("wood_diffuse", "./gfx/wood_diffuse.jpg");
        engine.add_texture("wood_metal", "./gfx/wood_metal.jpg");
        engine.add_texture("wood_normal", "./gfx/wood_normal.jpg");
        engine.add_texture("wood_rough", "./gfx/wood_rough.jpg");

        engine.add_sound("test_sound", "./sfx/wood_collision_1.wav");

        engine.add_material(new Material("test_wood", {
            diffuse: "wood_diffuse",
            normal: "wood_normal",
            roughness: "wood_rough",
            metalness: "wood_metal",

            friction: 0.5,
            restitution: 0.2,
            density: 1.0,

            impactSound: "test_sound",
            breakSound: "test_sound",
            scrapeSound: "test_sound",
            stepSound: "test_sound",
        }));

        engine.add_hdri("hdri", "./hdr/day.hdr");

        engine.add_model("indoraptor", "./glb/indoraptor.glb");
        engine.add_model("henry", "./glb/henry.glb");
        engine.add_model("tv", "./glb/tv.glb")

        engine.init({
            display_mode: 'normal_canvas'
        }).then(() => {
            const gameScene = engine.add_scene("game", GameScene);

            gameScene.add_instance("player", FPSPlayer, {
                position: { x: 0, y: 0.5, z: 0 }
            });

            gameScene.add_instance("floor_plane", PlaneInstance, {
                material: "test_wood",
                size: { x: 5000, y: 5000 },
                position: { x: 0, y: -1, z: 0 },
                rotation: { x: -90, y: 0, z: 0 },
                static: true,
                uv: {
                    top: { scale: { x: 1000, y: 1000 } }
                }
            });

            for (let i = 0; i < 10; i++) {
                gameScene.add_instance("box_" + i, BoxInstance, {
                    position: { x: Math.random() * 5, y: 5 + i, z: Math.random() * 5 },
                    material: "test_wood",
                    color: RandomHexColor()
                });
            }

            const hX = -15;
            const hZ = -15;
            const wallHeight = 4;
            const wallThickness = 0.5;

            gameScene.add_instance("house_wall_back", BoxInstance, {
                static: true,
                size: { x: 8, y: wallHeight, z: wallThickness },
                position: { x: hX, y: 1, z: hZ + 4 },
                material: "test_wood",
                color: 0x5d4037
            });

            gameScene.add_instance("house_wall_left", BoxInstance, {
                static: true,
                size: { x: wallThickness, y: wallHeight, z: 8 },
                position: { x: hX - 4, y: 1, z: hZ },
                material: "test_wood",
                color: 0x5d4037
            });

            gameScene.add_instance("house_wall_right", BoxInstance, {
                static: true,
                size: { x: wallThickness, y: wallHeight, z: 8 },
                position: { x: hX + 4, y: 1, z: hZ },
                material: "test_wood",
                color: 0x5d4037
            });

            gameScene.add_instance("house_front_left", BoxInstance, {
                static: true,
                size: { x: 3, y: wallHeight, z: wallThickness },
                position: { x: hX - 2.5, y: 1, z: hZ - 4 },
                material: "test_wood",
                color: 0x5d4037
            });

            gameScene.add_instance("house_front_right", BoxInstance, {
                static: true,
                size: { x: 3, y: wallHeight, z: wallThickness },
                position: { x: hX + 2.5, y: 1, z: hZ - 4 },
                material: "test_wood",
                color: 0x5d4037
            });

            gameScene.add_instance("house_front_top", BoxInstance, {
                static: true,
                size: { x: 2, y: 1.5, z: wallThickness },
                position: { x: hX, y: 2.25, z: hZ - 4 },
                material: "test_wood",
                color: 0x5d4037
            });

            gameScene.add_instance("house_roof_left", BoxInstance, {
                static: true,
                size: { x: 6, y: 0.2, z: 9 },
                position: { x: hX - 2.2, y: 4.2, z: hZ },
                rotation: { x: 0, y: 0, z: 35 },
                material: "test_wood",
                color: 0x3e2723
            });

            gameScene.add_instance("house_roof_right", BoxInstance, {
                static: true,
                size: { x: 6, y: 0.2, z: 9 },
                position: { x: hX + 2.2, y: 4.2, z: hZ },
                rotation: { x: 0, y: 0, z: -35 },
                material: "test_wood",
                color: 0x3e2723
            });

            gameScene.add_instance("house_table", BoxInstance, {
                static: false,
                size: { x: 3, y: 0.2, z: 2 },
                position: { x: hX, y: 0, z: hZ },
                material: "test_wood",
                color: 0x795548
            });

            gameScene.add_instance("character", AnimatedCharacter, {
                model: "indoraptor",
                position: { x: 2, y: 0, z: 0 },
                offsetZ: -0.5
            });

            gameScene.add_instance("henry", AnimatedCharacter, {
                model: "henry",
                position: { x: 3, y: 0, z: 0 },
                scale: 0.5
            });

            gameScene.add_instance("TV", BasicModelInstance, {
                model: "tv",
                position: { x: 4, y: 0.5, z: 4 },
                rotation: { x: 90, y: 90, z: 0 },
                scale: 2,
                colliderType: "shape_from_model"
            });

            gameScene.add_instance("indo", Indoraptor, {
                model: "indoraptor",
                position: { x: 10, y: 2, z: 10 },
                offsetZ: -0.5,
                runSpeed: 8,
                attackDistance: 3
            });

            gameScene.set_hdri("hdri", 1);

            engine.set_scene("game");

            engine.start();
        });
    </script>
</body>

</html>
